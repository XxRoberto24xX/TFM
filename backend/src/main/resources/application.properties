# Usamos el puerto 3306 que es el estándar de MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/gasStationPrices?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrival=true
spring.datasource.username=root
